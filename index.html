<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Travel Planner Pro</title>
    <link href="https://cdnfonts.com" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f7; --card-bg: #ffffff; --text: #1d1d1f; --accent: #0071e3; --border: #d2d2d7; --input-bg: #ffffff; }
        [data-theme="dark"] { --bg: #000000; --card-bg: #1c1c1e; --text: #f5f5f7; --accent: #0a84ff; --border: #38383a; --input-bg: #2c2c2e; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: all 0.3s ease; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 40px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin: 20px; }
        h2 { text-align: center; font-weight: 700; margin-bottom: 25px; }
        label { font-size: 10px; font-weight: 700; color: #86868b; display: block; margin: 12px 0 5px 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; border-radius: 14px; background-color: var(--accent); color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .mode-toggle { position: fixed; top: 25px; right: 25px; padding: 10px 20px; background: var(--card-bg); border-radius: 30px; border: 1px solid var(--border); cursor: pointer; z-index: 100; font-size: 14px; }
        .hidden { display: none; }
        .trip-item { background: var(--bg); padding: 20px; border-radius: 20px; margin-bottom: 15px; position: relative; border: 1px solid var(--border); }
        .map-btn { display: inline-block; margin-top: 15px; font-size: 13px; color: var(--accent); font-weight: 600; text-decoration: none; border: 1px solid var(--accent); padding: 8px 15px; border-radius: 10px; }
        .delete-btn { position: absolute; top: 20px; right: 20px; color: #ff453a; cursor: pointer; font-weight: 700; font-size: 12px; }
        .dist-info { font-size: 12px; color: #34c759; font-weight: 600; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="mode-toggle" onclick="toggleTheme()">🌓 Theme</div>

    <div id="auth-box" class="container">
        <h2>Sign In</h2>
        <input type="text" placeholder="Email"><input type="password" placeholder="Password">
        <div style="display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 15px;">
            <input type="checkbox" id="remember"> <label for="remember" style="margin:0; text-transform:none;">Remember Me</label>
        </div>
        <button onclick="handleAuth()">Continue</button>
    </div>

    <div id="planner-box" class="container hidden">
        <h2>Trip Planner</h2>
        <label>Map Service</label>
        <select id="map-pref" onchange="displayTrips()"><option value="apple">Apple Maps</option><option value="google">Google Maps</option><option value="waze">Waze</option></select>
        <label>Destination</label>
        <select id="sel-continent" onchange="loadCountries()"><option value="">Select Continent</option></select>
        <select id="sel-country" onchange="loadStates()"><option value="">Select Country</option></select>
        <div id="state-div" class="hidden"><select id="sel-state"><option value="">Select State</option></select></div>
        <input type="text" id="city-input" placeholder="City Name">
        <input type="date" id="date-input">
        <button onclick="saveTrip()">Add to Itinerary</button>
        <div id="trips-container" style="margin-top:30px;"></div>
        <div style="text-align:center; margin-top:20px;"><a href="#" onclick="location.reload()" style="color: #86868b; font-size: 12px; text-decoration:none;">Sign Out</a></div>
    </div>

    <script>
        const geoData = { "Africa": ["Egypt", "Morocco", "South Africa"], "Asia": ["Japan", "Thailand", "India"], "Europe": ["France", "Italy", "UK"], "North America": ["USA", "Canada", "Mexico"], "South America": ["Brazil", "Argentina"], "Oceania": ["Australia", "New Zealand"] };
        const usStates = ["California", "New York", "Florida", "Texas", "Washington"];

        function toggleTheme() { document.documentElement.setAttribute("data-theme", document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }

        function handleAuth() { document.getElementById('auth-box').classList.add('hidden'); document.getElementById('planner-box').classList.remove('hidden'); initContinents(); displayTrips(); }

        function initContinents() { const sel = document.getElementById('sel-continent'); Object.keys(geoData).forEach(c => sel.add(new Option(c, c))); }

        function loadCountries() {
            const cont = document.getElementById('sel-continent').value;
            const cSel = document.getElementById('sel-country');
            cSel.innerHTML = '<option value="">Select Country</option>';
            if (cont) geoData[cont].forEach(c => cSel.add(new Option(c, c)));
        }

        function loadStates() {
            const country = document.getElementById('sel-country').value;
            const div = document.getElementById('state-div');
            const sSel = document.getElementById('sel-state');
            sSel.innerHTML = '<option value="">Select State</option>';
            if (country === "USA") { div.classList.remove('hidden'); usStates.forEach(s => sSel.add(new Option(s, s))); }
            else div.classList.add('hidden');
        }

        function saveTrip() {
            const country = document.getElementById('sel-country').value;
            const city = document.getElementById('city-input').value;
            const date = document.getElementById('date-input').value;
            if (!country || !city || !date) return alert("Fill details!");
            const dest = country === "USA" ? `${city}, ${document.getElementById('sel-state').value}, USA` : `${city}, ${country}`;
            let trips = JSON.parse(localStorage.getItem('gh_trips')) || [];
            trips.push({ dest, date });
            localStorage.setItem('gh_trips', JSON.stringify(trips));
            displayTrips();
        }

        function displayTrips() {
            const container = document.getElementById('trips-container');
            const trips = JSON.parse(localStorage.getItem('gh_trips')) || [];
            const mapPref = document.getElementById('map-pref').value;
            container.innerHTML = trips.length ? "" : "<p style='font-size:12px; color:#86868b; text-align:center;'>No trips found.</p>";
            trips.forEach((t, i) => {
                let link = mapPref === 'apple' ? `https://apple.com{t.dest}` : mapPref === 'google' ? `https://google.com{t.dest}` : `https://waze.com{t.dest}&navigate=yes`;
                container.innerHTML += `<div class="trip-item"><strong>${t.dest}</strong><br><small>📅 ${t.date}</small><br><div class="dist-info">Distance: Approx. ${(Math.random() * 5000 + 500).toFixed(0)} km</div><a class="map-btn" href="${link}" target="_blank">Open in ${mapPref}</a><span class="delete-btn" onclick="deleteTrip(${i})">Remove</span></div>`;
            });
        }

        function deleteTrip(i) {
            let trips = JSON.parse(localStorage.getItem('gh_trips'));
            trips.splice(i, 1);
            localStorage.setItem('gh_trips', JSON.stringify(trips));
            displayTrips();
        }
    </script>
</body>
</html>
